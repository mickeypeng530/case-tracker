<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .sidebar.open { display: block; position: fixed; left: 0; top: 0; bottom: 0; width: 260px; z-index: 100; background: #0f0f1a; }
            .mobile-header { display: flex !important; }
        }
        
        .sidebar {
            background: rgba(0,0,0,0.3);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px 0;
            overflow-y: auto;
            max-height: 100vh;
            position: sticky;
            top: 0;
        }
        .logo { padding: 0 20px 20px; font-size: 1.3em; font-weight: 700; color: #64b5f6; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .nav-section { padding: 0 12px; margin-bottom: 20px; }
        .nav-title { font-size: 11px; text-transform: uppercase; color: #666; padding: 0 8px; margin-bottom: 8px; letter-spacing: 1px; }
        .nav-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; font-size: 14px; color: #aaa; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: rgba(100,181,246,0.2); color: #64b5f6; }
        .nav-count { font-size: 11px; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; }
        .nav-item.active .nav-count { background: rgba(100,181,246,0.3); }
        
        .subcat-list { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 6px; padding: 0 8px; }
        .subcat-item { padding: 5px 10px; font-size: 12px; color: #888; cursor: pointer; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.15s; }
        .subcat-item:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
        .subcat-item.active { background: rgba(240,173,78,0.2); color: #f0ad4e; border-color: #f0ad4e; }
        
        .main { padding: 20px; overflow-y: auto; }
        .mobile-header { display: none; align-items: center; gap: 15px; margin-bottom: 20px; }
        .menu-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 18px; }
        
        .search-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 200px; padding: 12px 18px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; background: rgba(255,255,255,0.05); color: #fff; font-size: 14px; }
        .search-input:focus { outline: none; border-color: #64b5f6; }
        .search-input::placeholder { color: #555; }
        .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #aaa; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
        .btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .btn.active { background: rgba(255,193,7,0.2); color: #ffc107; border-color: #ffc107; }
        
        .tag-section { margin-bottom: 20px; }
        .tag-title { font-size: 12px; color: #666; margin-bottom: 10px; }
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { padding: 5px 12px; background: rgba(129,199,132,0.15); border: 1px solid rgba(129,199,132,0.3); border-radius: 15px; font-size: 12px; color: #81c784; cursor: pointer; transition: all 0.15s; }
        .tag:hover { background: rgba(129,199,132,0.25); }
        .tag.active { background: #81c784; color: #1a1a2e; }
        
        .table-container { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; }
        .table-scroll { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: rgba(100,181,246,0.1); padding: 12px 10px; text-align: left; font-weight: 600; color: #64b5f6; white-space: nowrap; cursor: pointer; position: sticky; top: 0; }
        th:hover { background: rgba(100,181,246,0.2); }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top; }
        tr:hover { background: rgba(255,255,255,0.03); }
        tr.tracked { background: rgba(255,193,7,0.08); }
        tr.tracked:hover { background: rgba(255,193,7,0.12); }
        
        .cell-track { text-align: center; }
        .track-btn { background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.4; transition: all 0.15s; padding: 5px; }
        .track-btn:hover { opacity: 1; transform: scale(1.2); }
        .track-btn.active { opacity: 1; }
        .track-btn.saving { animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .cell-id { font-family: 'SF Mono', Monaco, monospace; color: #81c784; font-weight: 600; white-space: nowrap; }
        .cell-subcat { color: #f0ad4e; font-size: 12px; max-width: 100px; }
        .cell-age { color: #aaa; white-space: nowrap; }
        .cell-modality { color: #64b5f6; font-size: 12px; }
        .cell-date { color: #888; font-size: 12px; white-space: nowrap; }
        .cell-finding { max-width: 400px; line-height: 1.5; }
        .cell-note { max-width: 200px; font-size: 12px; color: #f0ad4e; line-height: 1.4; }
        .highlight { background: rgba(255,235,59,0.3); padding: 0 3px; border-radius: 3px; }
        
        .loading, .empty, .error { text-align: center; padding: 60px 20px; color: #666; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(100,181,246,0.2); border-top-color: #64b5f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-icon { font-size: 48px; margin-bottom: 15px; }
        .error { color: #e57373; }
        
        .sync-status { font-size: 11px; padding: 4px 8px; border-radius: 4px; margin-left: 10px; }
        .sync-status.synced { background: rgba(129,199,132,0.2); color: #81c784; }
        .sync-status.syncing { background: rgba(255,193,7,0.2); color: #ffc107; }
        .sync-status.error { background: rgba(244,67,54,0.2); color: #e57373; }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar" id="sidebar">
            <div class="logo">📋 Case Tracker <span class="sync-status synced" id="syncStatus">✓ 同步</span></div>
            <div class="nav-section">
                <div class="nav-title">分頁</div>
                <div id="sheetNav"></div>
            </div>
            <div class="nav-section" id="subcatSection" style="display:none;">
                <div class="nav-title">小分類</div>
                <div class="subcat-list" id="subcatNav"></div>
            </div>
            <div class="nav-section">
                <div class="nav-title">統計</div>
                <div style="padding: 0 12px; font-size: 13px; color: #888;">
                    <div style="margin-bottom: 8px;">總案例: <strong id="totalCount" style="color:#64b5f6;">0</strong></div>
                    <div style="margin-bottom: 8px;">追蹤中: <strong id="trackedCount" style="color:#ffc107;">0</strong></div>
                    <div>目前顯示: <strong id="filteredCount" style="color:#81c784;">0</strong></div>
                </div>
            </div>
        </div>
        
        <div class="main">
            <div class="mobile-header">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <span style="font-size: 1.2em; font-weight: 600; color: #64b5f6;">📋 Case Tracker</span>
            </div>
            
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜尋 ID、診斷、關鍵字...">
                <button class="btn" id="trackFilterBtn" onclick="toggleTrackFilter()">⏳ 只看追蹤</button>
                <button class="btn" onclick="refreshData()">↻ 重新整理</button>
            </div>
            
            <div class="tag-section" id="tagSection" style="display:none;">
                <div class="tag-title">🏷️ 常見診斷（點擊篩選）</div>
                <div class="tag-cloud" id="tagCloud"></div>
            </div>
            
            <div class="loading" id="loading"><div class="spinner"></div>載入資料中...</div>
            
            <div class="error" id="errorState" style="display:none;">
                <div class="empty-icon">⚠️</div>
                <div id="errorMsg">載入失敗</div>
            </div>
            
            <div class="table-container" id="tableContainer" style="display:none;">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:50px;">追蹤</th>
                                <th onclick="sortBy('subcat')">分類</th>
                                <th onclick="sortBy('id')">ID</th>
                                <th onclick="sortBy('age')">Age</th>
                                <th onclick="sortBy('modality')">Modality</th>
                                <th onclick="sortBy('date')">Date</th>
                                <th onclick="sortBy('finding')">Finding</th>
                                <th onclick="sortBy('note')">Note</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
            
            <div class="empty" id="emptyState" style="display:none;">
                <div class="empty-icon">🔍</div>
                <div>沒有符合的資料</div>
            </div>
        </div>
    </div>

<script>
// ============ CONFIG ============
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyyMIxWpe7snVeFJbfDs58nI7h46MCiODs_FLD21p6i-h--HUKng2JKlcBSeC860uGg/exec';

var PUBLISHED_ID = '2PACX-1vSF1YW3PjcvIZrNx39H-n6X3IGgfrcdIZCTJ2E5PRV-IhYj-I66V13A4fI_DWuJvp2bF2vOImWc4mrF';

var SHEETS = [
    { name: 'MSK', gid: 0 },
    { name: 'MSK-tumor', gid: 962179649 },
    { name: 'MSK-spine', gid: 1730152768 },
    { name: 'MSK-knee', gid: 490739540 },
    { name: 'MSK procedure', gid: 1382277388 },
    { name: 'NR', gid: 483962865 },
    { name: 'CH GI', gid: 959126322 },
    { name: 'BMD', gid: 1256805640 },
    { name: 'C spine oblique', gid: 130096719 },
    { name: 'ER x ray', gid: 505958270 },
    { name: 'Difficult TAE', gid: 719488707 },
    { name: 'Bone age', gid: 1886063580 }
];

// 從 Excel 匯入的初始追蹤名單
var INITIAL_TRACKED = ['543115', 'C98752', '1403256', '1785464', '1792056', '1831609', '1806997', 'B74650', 'J34713', 'T74808', 'G30069', '1427341', '1708974', '1254120', 'B05986', '1102588', 'U28473', 'A82137', 'W76052'];

// ============ STATE ============
var allData = {};
var trackedIds = [];
var currentSheet = 'MSK';
var currentSubcat = '';
var currentTag = '';
var searchTerm = '';
var sortCol = '';
var sortAsc = true;
var showTrackedOnly = false;

// ============ INIT ============
document.addEventListener('DOMContentLoaded', function() {
    renderSheetNav();
    loadTrackedFromSheet();
    loadAllSheets();
    document.getElementById('searchInput').addEventListener('input', function(e) {
        searchTerm = e.target.value.toLowerCase();
        renderTable();
    });
});

// ============ SYNC STATUS ============
function setSyncStatus(status) {
    var el = document.getElementById('syncStatus');
    el.className = 'sync-status ' + status;
    if (status === 'synced') el.textContent = '✓ 同步';
    else if (status === 'syncing') el.textContent = '⟳ 同步中...';
    else if (status === 'error') el.textContent = '✗ 錯誤';
}

// ============ TRACKED IDS (Google Sheets) ============
function loadTrackedFromSheet() {
    setSyncStatus('syncing');
    var url = APPS_SCRIPT_URL + '?action=get';
    
    fetch(url, { redirect: 'follow' })
        .then(function(r) { 
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json(); 
        })
        .then(function(data) {
            if (data.success && data.ids && data.ids.length > 0) {
                trackedIds = data.ids;
            } else {
                // 空的，使用初始名單並寫入
                trackedIds = INITIAL_TRACKED.slice();
                saveTrackedToSheet();
            }
            setSyncStatus('synced');
            updateTrackedCount();
            renderTable();
        })
        .catch(function(err) {
            console.error('Error loading tracked:', err);
            // 使用 localStorage 備援
            var saved = localStorage.getItem('caseTrackerTracked');
            if (saved) {
                trackedIds = JSON.parse(saved);
            } else {
                trackedIds = INITIAL_TRACKED.slice();
            }
            setSyncStatus('error');
            updateTrackedCount();
            renderTable();
        });
}

function saveTrackedToSheet() {
    // 先存到 localStorage 備援
    localStorage.setItem('caseTrackerTracked', JSON.stringify(trackedIds));
    
    setSyncStatus('syncing');
    var url = APPS_SCRIPT_URL + '?action=save&ids=' + encodeURIComponent(JSON.stringify(trackedIds));
    
    fetch(url, { redirect: 'follow' })
        .then(function(r) { 
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json(); 
        })
        .then(function(data) {
            if (data.success) {
                setSyncStatus('synced');
            } else {
                console.error('Save error:', data.error);
                setSyncStatus('error');
            }
        })
        .catch(function(err) {
            console.error('Save error:', err);
            setSyncStatus('error');
        });
}

function isTracked(id) {
    return trackedIds.indexOf(id) !== -1;
}

function toggleTracked(id) {
    var idx = trackedIds.indexOf(id);
    if (idx === -1) {
        trackedIds.push(id);
    } else {
        trackedIds.splice(idx, 1);
    }
    updateTrackedCount();
    renderTable();
    saveTrackedToSheet();
}

function updateTrackedCount() {
    document.getElementById('trackedCount').textContent = trackedIds.length;
}

function toggleTrackFilter() {
    showTrackedOnly = !showTrackedOnly;
    var btn = document.getElementById('trackFilterBtn');
    if (showTrackedOnly) {
        btn.classList.add('active');
        btn.textContent = '⏳ 顯示全部';
        // 自動切換到「全部」分頁，顯示所有追蹤
        currentSheet = 'ALL';
        renderSheetNav();
        renderSubcatNav();
        renderTagCloud();
    } else {
        btn.classList.remove('active');
        btn.textContent = '⏳ 只看追蹤';
    }
    renderTable();
}

// ============ DATA LOADING ============
function getCSVUrl(gid) {
    return 'https://docs.google.com/spreadsheets/d/e/' + PUBLISHED_ID + '/pub?gid=' + gid + '&single=true&output=csv';
}

function loadAllSheets() {
    var loaded = 0;
    SHEETS.forEach(function(sheet) {
        fetch(getCSVUrl(sheet.gid))
            .then(function(r) { 
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.text(); 
            })
            .then(function(text) {
                allData[sheet.name] = parseCSV(text);
                loaded++;
                if (loaded === SHEETS.length) onAllLoaded();
            })
            .catch(function(err) {
                console.error('Error loading ' + sheet.name, err);
                allData[sheet.name] = [];
                loaded++;
                if (loaded === SHEETS.length) onAllLoaded();
            });
    });
}

function refreshData() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('tableContainer').style.display = 'none';
    document.getElementById('errorState').style.display = 'none';
    allData = {};
    loadTrackedFromSheet();
    loadAllSheets();
}

function onAllLoaded() {
    document.getElementById('loading').style.display = 'none';
    
    var totalItems = 0;
    Object.keys(allData).forEach(function(key) { totalItems += allData[key].length; });
    
    if (totalItems === 0) {
        document.getElementById('errorState').style.display = 'block';
        document.getElementById('errorMsg').textContent = '無法載入資料，請確認 Google Sheets 已發布';
        return;
    }
    
    document.getElementById('tableContainer').style.display = 'block';
    updateTotalCount();
    updateTrackedCount();
    renderSheetNav();
    selectSheet('MSK');
}

// ============ CSV PARSING ============
function parseCSV(text) {
    var lines = text.split('\n');
    var data = [];
    var currentSubcat = '';
    var lastItem = null;
    
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        
        var row = parseCSVLine(line);
        var nonEmpty = row.filter(function(v) { return v && v.trim(); });
        if (nonEmpty.length === 0) continue;
        
        // 分類標題：單一欄位、不是ID、長度短、不含中文長句
        if (nonEmpty.length === 1 && !/^[A-Z]?\d{5,7}$/.test(nonEmpty[0]) && nonEmpty[0].length < 20 && !/[\u4e00-\u9fff]{4,}/.test(nonEmpty[0])) {
            currentSubcat = nonEmpty[0];
            continue;
        }
        
        var item = { subcat: currentSubcat, id: '', age: '', modality: '', date: '', finding: '', note: '' };
        var findings = [];
        var notes = [];
        
        for (var j = 0; j < row.length; j++) {
            var val = row[j] ? row[j].trim() : '';
            if (!val) continue;
            
            if (!item.id && /^[A-Z]?\d{5,7}$/.test(val)) item.id = val;
            else if (!item.age && /^\d{1,3}[MmFf]$/.test(val)) item.age = val;
            else if (!item.age && /^[男女]\d{1,3}$/.test(val)) item.age = val;
            else if (!item.date && /^\d{4}-\d{2}-\d{2}/.test(val)) item.date = val.substring(0, 10);
            else if (!item.modality && val.length < 25 && /^(MR|CT|X-?ray|Angio|US|PET|.*[Ss]pine)/i.test(val)) item.modality = val;
            // 中文長句（4個以上中文字）視為註記
            else if (/[\u4e00-\u9fff]{4,}/.test(val)) notes.push(val);
            else findings.push(val);
        }
        
        item.finding = findings.join(' | ');
        item.note = notes.join(' | ');
        
        if (item.id) {
            data.push(item);
            lastItem = item;
        } else if (lastItem && (item.finding || item.note)) {
            if (item.finding) lastItem.finding = lastItem.finding + ' | ' + item.finding;
            if (item.note) lastItem.note = lastItem.note ? lastItem.note + ' | ' + item.note : item.note;
        }
    }
    return data;
}

function parseCSVLine(line) {
    var result = [], current = '', inQuotes = false;
    for (var i = 0; i < line.length; i++) {
        var c = line[i];
        if (c === '"') inQuotes = !inQuotes;
        else if (c === ',' && !inQuotes) { result.push(current); current = ''; }
        else current += c;
    }
    result.push(current);
    return result;
}

// ============ NAVIGATION ============
function renderSheetNav() {
    var html = '';
    // 加入「全部」選項
    var allCount = 0;
    Object.keys(allData).forEach(function(key) { allCount += allData[key].length; });
    var allActive = currentSheet === 'ALL' ? 'active' : '';
    html += '<div class="nav-item ' + allActive + '" onclick="selectSheet(\'ALL\')"><span>📊 全部</span><span class="nav-count">' + allCount + '</span></div>';
    
    SHEETS.forEach(function(sheet) {
        var count = allData[sheet.name] ? allData[sheet.name].length : 0;
        var active = sheet.name === currentSheet ? 'active' : '';
        html += '<div class="nav-item ' + active + '" onclick="selectSheet(\'' + sheet.name + '\')"><span>' + sheet.name + '</span><span class="nav-count">' + count + '</span></div>';
    });
    document.getElementById('sheetNav').innerHTML = html;
}

function selectSheet(name) {
    currentSheet = name;
    currentSubcat = '';
    currentTag = '';
    renderSheetNav();
    renderSubcatNav();
    renderTagCloud();
    renderTable();
}

function renderSubcatNav() {
    var data = [];
    if (currentSheet === 'ALL') {
        SHEETS.forEach(function(sheet) {
            data = data.concat(allData[sheet.name] || []);
        });
    } else {
        data = allData[currentSheet] || [];
    }
    
    var subcats = {};
    data.forEach(function(item) { if (item.subcat) subcats[item.subcat] = (subcats[item.subcat] || 0) + 1; });
    
    var keys = Object.keys(subcats);
    if (keys.length === 0) { document.getElementById('subcatSection').style.display = 'none'; return; }
    
    document.getElementById('subcatSection').style.display = 'block';
    var html = '<span class="subcat-item ' + (currentSubcat === '' ? 'active' : '') + '" onclick="selectSubcat(\'\')">全部</span>';
    keys.forEach(function(key) {
        html += '<span class="subcat-item ' + (currentSubcat === key ? 'active' : '') + '" onclick="selectSubcat(\'' + key.replace(/'/g, "\\'") + '\')">' + key + ' (' + subcats[key] + ')</span>';
    });
    document.getElementById('subcatNav').innerHTML = html;
}

function selectSubcat(subcat) { currentSubcat = subcat; renderSubcatNav(); renderTable(); }

// ============ TAGS ============
function renderTagCloud() {
    var data = [];
    if (currentSheet === 'ALL') {
        SHEETS.forEach(function(sheet) {
            data = data.concat(allData[sheet.name] || []);
        });
    } else {
        data = allData[currentSheet] || [];
    }
    
    var tags = {};
    data.forEach(function(item) {
        if (!item.finding) return;
        item.finding.toLowerCase().split(/[\s|,]+/).forEach(function(w) {
            w = w.trim();
            if (w.length > 3 && w.length < 25 && !/^\d+$/.test(w) && !/^(the|and|with|from|for|that|this|nan)$/.test(w)) {
                tags[w] = (tags[w] || 0) + 1;
            }
        });
    });
    
    var sorted = Object.keys(tags).filter(function(k) { return tags[k] >= 2; }).sort(function(a, b) { return tags[b] - tags[a]; }).slice(0, 12);
    if (sorted.length === 0) { document.getElementById('tagSection').style.display = 'none'; return; }
    
    document.getElementById('tagSection').style.display = 'block';
    var html = '';
    sorted.forEach(function(tag) {
        html += '<span class="tag ' + (currentTag === tag ? 'active' : '') + '" onclick="selectTag(\'' + tag + '\')">' + tag + ' (' + tags[tag] + ')</span>';
    });
    document.getElementById('tagCloud').innerHTML = html;
}

function selectTag(tag) { currentTag = currentTag === tag ? '' : tag; renderTagCloud(); renderTable(); }

// ============ TABLE ============
function getFilteredData() {
    var data = [];
    
    // 如果選「全部」，合併所有分頁資料
    if (currentSheet === 'ALL') {
        SHEETS.forEach(function(sheet) {
            var sheetData = allData[sheet.name] || [];
            sheetData.forEach(function(item) {
                var newItem = Object.assign({}, item);
                newItem.sheetName = sheet.name;  // 加上來源分頁
                data.push(newItem);
            });
        });
    } else {
        data = allData[currentSheet] || [];
    }
    
    return data.filter(function(item) {
        if (currentSubcat && item.subcat !== currentSubcat) return false;
        if (currentTag && item.finding.toLowerCase().indexOf(currentTag) === -1) return false;
        if (showTrackedOnly && !isTracked(item.id)) return false;
        if (searchTerm) {
            var text = (item.id + ' ' + item.subcat + ' ' + item.age + ' ' + item.modality + ' ' + item.finding).toLowerCase();
            if (text.indexOf(searchTerm) === -1) return false;
        }
        return true;
    });
}

function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    renderTable();
}

function renderTable() {
    var data = getFilteredData();
    if (sortCol) {
        data.sort(function(a, b) {
            var va = a[sortCol] || '', vb = b[sortCol] || '';
            var cmp = va.localeCompare(vb, 'zh-TW', { numeric: true });
            return sortAsc ? cmp : -cmp;
        });
    }
    
    document.getElementById('filteredCount').textContent = data.length;
    
    if (data.length === 0) {
        document.getElementById('tableContainer').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        return;
    }
    
    document.getElementById('tableContainer').style.display = 'block';
    document.getElementById('emptyState').style.display = 'none';
    
    var html = '';
    data.forEach(function(item) {
        var finding = item.finding;
        if (searchTerm) {
            var regex = new RegExp('(' + searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            finding = finding.replace(regex, '<span class="highlight">$1</span>');
        }
        var tracked = isTracked(item.id);
        var rowClass = tracked ? 'tracked' : '';
        var btnClass = tracked ? 'active' : '';
        var btnIcon = tracked ? '⏳' : '○';
        
        html += '<tr class="' + rowClass + '">';
        html += '<td class="cell-track"><button class="track-btn ' + btnClass + '" onclick="toggleTracked(\'' + item.id + '\')" title="點擊追蹤/取消追蹤">' + btnIcon + '</button></td>';
        html += '<td class="cell-subcat">' + (item.subcat || '-') + '</td>';
        html += '<td class="cell-id">' + (item.id || '-') + '</td>';
        html += '<td class="cell-age">' + (item.age || '-') + '</td>';
        html += '<td class="cell-modality">' + (item.modality || '-') + '</td>';
        html += '<td class="cell-date">' + (item.date || '-') + '</td>';
        html += '<td class="cell-finding">' + (finding || '-') + '</td>';
        html += '<td class="cell-note">' + (item.note || '-') + '</td>';
        html += '</tr>';
    });
    document.getElementById('tableBody').innerHTML = html;
}

function updateTotalCount() {
    var total = 0;
    Object.keys(allData).forEach(function(key) { total += allData[key].length; });
    document.getElementById('totalCount').textContent = total;
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
</script>
